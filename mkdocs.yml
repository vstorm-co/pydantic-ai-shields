site_name: Pydantic AI Shields
site_description: Guardrail capabilities for Pydantic AI agents
site_url: https://vstorm-co.github.io/pydantic-ai-shields/
repo_url: https://github.com/vstorm-co/pydantic-ai-shields
repo_name: vstorm-co/pydantic-ai-shields

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tooltips
    # Table of contents
    - toc.follow
    # Header
    - announce.dismiss

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - social:
      enabled: !ENV [CI, false]
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            signature_crossrefs: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - index.md: Project overview and quick start
          - installation.md: Installation instructions
          - getting-help.md: How to get help
        Core Concepts:
          - concepts/index.md: How shields work as native capabilities
        Advanced Features:
          - advanced/async-guardrails.md: Concurrent guard + LLM execution
          - advanced/cost-tracking.md: Token/USD tracking and budget enforcement
        Examples:
          - examples/index.md: Examples overview
          - examples/security.md: Layered security configuration
          - examples/pii-detection.md: PII detection
          - examples/prompt-injection.md: Prompt injection detection
          - examples/toxicity-check.md: Toxicity check
          - examples/json-schema-validation.md: JSON schema validation
          - examples/cost-tracking.md: Cost tracking example
        API Reference:
          - api/index.md: API overview
          - api/guardrails.md: Infrastructure shields API
          - api/shields.md: Content shields API
          - api/exceptions.md: Exception classes

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  # PyMdownx
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vstorm-co/pydantic-ai-shields
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pydantic-ai-shields/
      name: PyPI
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Pydantic AI Shields: index.md
  - Installation: installation.md
  - Getting Help: getting-help.md
  - Core Concepts:
    - concepts/index.md
  - Advanced Features:
    - advanced/async-guardrails.md
    - advanced/cost-tracking.md
  - Examples:
    - examples/index.md
    - Security:
      - examples/security.md
      - examples/pii-detection.md
      - examples/prompt-injection.md
      - examples/toxicity-check.md
      - examples/json-schema-validation.md
    - Cost Control:
      - examples/cost-tracking.md
  - API Reference:
    - api/index.md
    - Infrastructure Shields: api/guardrails.md
    - Content Shields: api/shields.md
    - Exceptions: api/exceptions.md

validation:
  nav:
    omitted_files: info
